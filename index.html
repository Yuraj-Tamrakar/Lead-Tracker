<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Tracker — Home Expert Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2d6a1f;--green-mid:#3d8a2a;--green-light:#eaf4e6;--green-border:#b8dfaa;
  --orange:#d4620a;--orange-light:#fef3ea;--orange-border:#f5c89a;
  --ink:#1a1a17;--ink2:#4a4a40;--ink3:#8a8a7a;
  --paper:#faf9f5;--paper2:#f3f1eb;--paper3:#eae8e0;
  --border:rgba(26,26,23,0.1);--border2:rgba(26,26,23,0.18);
  --warn:#b52a1a;--warn-light:#fdecea;
  --blue:#1a4a7a;--blue-light:#eaf0f8;
  --shadow:0 1px 4px rgba(26,26,23,0.07),0 4px 16px rgba(26,26,23,0.04);
  --shadow-md:0 2px 10px rgba(26,26,23,0.09),0 8px 32px rgba(26,26,23,0.06);
  --r:10px;--r-lg:16px;
  --serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --green:#5aab3a;--green-mid:#4a9030;--green-light:#1a2e14;--green-border:#3a6028;
    --orange:#e07828;--orange-light:#2a1a08;--orange-border:#6a3a10;
    --ink:#f0efe8;--ink2:#aaa99a;--ink3:#6a6a5a;
    --paper:#141412;--paper2:#1e1e1a;--paper3:#282824;
    --border:rgba(240,239,232,0.1);--border2:rgba(240,239,232,0.18);
    --warn:#e05540;--warn-light:#2a1410;--blue:#6a9fd8;--blue-light:#141e2a;
    --shadow:0 1px 4px rgba(0,0,0,0.25),0 4px 16px rgba(0,0,0,0.18);
    --shadow-md:0 2px 10px rgba(0,0,0,0.3),0 8px 32px rgba(0,0,0,0.2);
  }
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--paper3);color:var(--ink);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
.app{max-width:700px;margin:0 auto;padding:0 16px 80px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 0 0;margin-bottom:28px;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}
.brand-logo{height:52px;width:auto;object-fit:contain}
.brand-name{font-family:var(--serif);font-size:18px;color:var(--ink);letter-spacing:-0.2px;line-height:1.2}
.brand-sub{font-size:11px;color:var(--ink3);font-weight:300;letter-spacing:0.5px;text-transform:uppercase;margin-top:1px}
.add-btn{display:flex;align-items:center;gap:7px;font-family:var(--sans);font-size:13px;font-weight:500;padding:10px 18px;border-radius:40px;border:none;background:var(--green);color:#fff;cursor:pointer;transition:opacity 0.15s,transform 0.1s;white-space:nowrap;flex-shrink:0}
.add-btn:hover{opacity:0.85}.add-btn:active{transform:scale(0.97)}
.add-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}
.sync-status{font-size:12px;padding:6px 14px;border-radius:20px;background:var(--green-light);color:var(--green);border:1px solid var(--green-border);display:inline-flex;align-items:center;gap:6px}
.sync-status.err{background:var(--warn-light);color:var(--warn);border-color:transparent}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.stat{background:var(--paper2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;transition:transform 0.15s}
.stat:hover{transform:translateY(-1px)}
.stat-num{font-family:var(--serif);font-size:32px;color:var(--ink);line-height:1;margin-bottom:4px}
.stat-num.g{color:var(--green-mid)}.stat-num.o{color:var(--orange)}
.stat-label{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:0.5px}
.controls{margin-bottom:20px;display:flex;flex-direction:column;gap:10px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--ink3);fill:none;stroke-width:2;stroke-linecap:round;pointer-events:none}
.search{width:100%;font-family:var(--sans);font-size:14px;padding:11px 14px 11px 38px;border:1px solid var(--border2);border-radius:var(--r);background:var(--paper2);color:var(--ink);transition:border-color 0.15s,box-shadow 0.15s}
.search::placeholder{color:var(--ink3)}
.search:focus{outline:none;border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(61,138,42,0.12)}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.f-btn{font-family:var(--sans);font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--ink2);cursor:pointer;transition:all 0.15s}
.f-btn:hover{background:var(--paper3)}.f-btn.active{background:var(--green);color:#fff;border-color:transparent}
.leads{display:flex;flex-direction:column;gap:10px}
.card{background:var(--paper2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;transition:box-shadow 0.2s,transform 0.15s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent}
.card.overdue::before{background:var(--warn)}.card.today-due::before{background:var(--green)}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}.card.done{opacity:0.4}
.card-top{display:flex;align-items:flex-start;gap:12px}
.check-wrap{padding-top:2px;flex-shrink:0}
.check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;appearance:none;-webkit-appearance:none;position:relative;transition:all 0.15s}
.check:checked{background:var(--green);border-color:var(--green)}
.check:checked::after{content:'';position:absolute;top:3px;left:6px;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg)}
.check:focus{outline:none;box-shadow:0 0 0 3px rgba(61,138,42,0.2)}
.card-body{flex:1;min-width:0}
.card-name{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-contact{font-size:12px;color:var(--ink3);margin-bottom:10px}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:400;white-space:nowrap}
.tag-default{background:var(--paper3);color:var(--ink2);border:1px solid var(--border)}
.tag-overdue{background:var(--warn-light);color:var(--warn)}
.tag-today{background:var(--green-light);color:var(--green)}
.tag-upcoming{background:var(--blue-light);color:var(--blue)}
.tag-synced{background:var(--green-light);color:var(--green)}
.tag-interval{background:var(--orange-light);color:var(--orange)}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.act-btn{font-family:var(--sans);font-size:12px;font-weight:400;padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--ink2);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.act-btn:hover{background:var(--paper3);color:var(--ink)}
.act-btn.primary{background:var(--green);color:#fff;border-color:transparent}
.act-btn.primary:hover{opacity:0.85}
.act-btn.success{background:var(--green-light);color:var(--green);border-color:var(--green-border)}
.act-btn.snooze{background:var(--orange-light);color:var(--orange);border-color:var(--orange-border)}
.act-btn.danger{background:var(--warn-light);color:var(--warn);border-color:transparent}
.card-notes{font-size:12px;color:var(--ink2);border-top:1px solid var(--border);padding-top:10px;margin-top:10px;line-height:1.5}
.empty{text-align:center;padding:48px 16px;color:var(--ink3)}
.empty-icon{font-size:28px;margin-bottom:12px;opacity:0.35}.empty-text{font-size:14px}
.overlay{display:none;position:fixed;inset:0;background:rgba(15,15,13,0.5);z-index:100;align-items:flex-end;justify-content:center;padding:0}
.overlay.open{display:flex}
@media(min-width:520px){.overlay{align-items:center;padding:16px}}
.modal{background:var(--paper);border-radius:var(--r-lg) var(--r-lg) 0 0;width:100%;max-width:500px;padding:24px 20px 32px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-md)}
@media(min-width:520px){.modal{border-radius:var(--r-lg);padding:28px}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px;display:block}
@media(min-width:520px){.modal-handle{display:none}}
.modal-title{font-family:var(--serif);font-size:20px;color:var(--ink);margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:var(--ink2);margin-bottom:5px;font-weight:500;letter-spacing:0.3px;text-transform:uppercase}
.field input,.field textarea{width:100%;font-family:var(--sans);font-size:14px;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r);background:var(--paper2);color:var(--ink);transition:border-color 0.15s,box-shadow 0.15s}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(61,138,42,0.12)}
.field textarea{resize:vertical;min-height:75px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;flex-direction:column;gap:8px;margin-top:24px}
@media(min-width:400px){.modal-footer{flex-direction:row;justify-content:flex-end}}
.modal-btn{font-family:var(--sans);font-size:14px;font-weight:500;padding:12px 20px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--ink);cursor:pointer;transition:all 0.15s;width:100%}
@media(min-width:400px){.modal-btn{width:auto}}
.modal-btn:hover{background:var(--paper3)}
.modal-btn.cta{background:var(--green);color:#fff;border-color:transparent}
.modal-btn.cta:hover{opacity:0.88}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);font-family:var(--sans);font-size:13px;padding:10px 18px;border-radius:40px;background:var(--green);color:#fff;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.25s,transform 0.25s;z-index:200;box-shadow:var(--shadow-md)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spin{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px;color:var(--ink3);font-size:14px}
@media(max-width:380px){
  .stats{grid-template-columns:1fr 1fr}
  .stats .stat:last-child{grid-column:span 2}
  .stat-num{font-size:26px}
  .brand-logo{height:40px}.brand-name{font-size:15px}
}
</style>
</head>

<script>
const SUPA_URL='https://qmnsmqfmzrzpuvntyjfk.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtbnNtcWZtenJ6cHV2bnR5amZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTAwMjIsImV4cCI6MjA5MTMyNjAyMn0.5PufmcMIAevSkmKFaTsBuMkUioTOgAb26-v2oxvhX-w';
const HEADERS={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

let leads=[],filter='active',editId=null;

function today(){return new Date().toISOString().split('T')[0];}
function daysUntil(d){return Math.ceil((new Date(d)-new Date(today()))/864e5);}
function getStatus(l){
  if(l.done)return'done';
  const d=daysUntil(l.next_date);
  if(d<0)return'overdue';
  if(d===0)return'today';
  return'upcoming';
}
function showToast(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=ok?'var(--green)':'var(--warn)';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);
}
function setConnected(ok,msg){
  const el=document.getElementById('sync-status');
  el.className='sync-status'+(ok?'':' err');
  el.innerHTML='<span class="dot"></span>'+(ok?msg||'Connected':msg||'Offline');
}

async function loadLeads(){
  try{
    const res=await fetch(SUPA_URL+'/rest/v1/leads?order=next_date.asc',{headers:HEADERS});
    if(!res.ok)throw new Error('Failed to load');
    leads=await res.json();
    setConnected(true,'Live sync on');
    render();
  }catch(e){
    setConnected(false,'Connection error');
    showToast('Could not load leads — check connection',false);
    document.getElementById('leads').innerHTML='<div class="empty"><div class="empty-text">Could not connect to database.</div></div>';
  }
}

async function insertLead(lead){
  const res=await fetch(SUPA_URL+'/rest/v1/leads',{
    method:'POST',headers:{...HEADERS,'Prefer':'return=representation'},
    body:JSON.stringify(lead)
  });
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}

async function updateLead(id,data){
  const res=await fetch(SUPA_URL+'/rest/v1/leads?id=eq.'+id,{
    method:'PATCH',headers:{...HEADERS,'Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}

async function deleteLead(id){
  if(!confirm('Delete this lead?'))return;
  try{
    await fetch(SUPA_URL+'/rest/v1/leads?id=eq.'+id,{method:'DELETE',headers:HEADERS});
    leads=leads.filter(x=>x.id!==id);render();showToast('Lead deleted');
  }catch(e){showToast('Delete failed',false);}
}

function setFilter(f,el){
  filter=f;document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');render();
}

function openModal(id){
  editId=id||null;
  document.getElementById('modal-title').textContent=id?'Edit lead':'New lead';
  document.getElementById('save-btn').textContent=id?'Save changes':'Save lead';
  if(id){
    const l=leads.find(x=>x.id===id);
    document.getElementById('f-name').value=l.name;
    document.getElementById('f-contact').value=l.contact||'';
    document.getElementById('f-notes').value=l.notes||'';
    document.getElementById('f-interval').value=l.interval;
    document.getElementById('f-time').value=l.time||'09:00';
    document.getElementById('f-date').value=l.next_date;
  }else{
    ['f-name','f-contact','f-notes'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('f-interval').value='3';
    document.getElementById('f-time').value='09:00';
    document.getElementById('f-date').value=today();
  }
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}

async function saveLead(){
  const name=document.getElementById('f-name').value.trim();
  const interval=parseInt(document.getElementById('f-interval').value)||3;
  const next_date=document.getElementById('f-date').value||today();
  if(!name){showToast('Name is required',false);return;}
  const btn=document.getElementById('save-btn');
  btn.innerHTML='<span class="spin"></span>Saving...';btn.disabled=true;
  try{
    if(editId){
      const data={name,contact:document.getElementById('f-contact').value.trim(),notes:document.getElementById('f-notes').value.trim(),interval,time:document.getElementById('f-time').value,next_date};
      await updateLead(editId,data);
      const idx=leads.findIndex(x=>x.id===editId);
      if(idx>-1)leads[idx]={...leads[idx],...data};
      showToast('Lead updated');
    }else{
      const lead={id:Date.now().toString(),name,contact:document.getElementById('f-contact').value.trim(),notes:document.getElementById('f-notes').value.trim(),interval,time:document.getElementById('f-time').value||'09:00',next_date,done:false,cal_synced:false,created:today()};
      await insertLead(lead);
      leads.unshift(lead);
      showToast('Lead saved');
    }
    closeModal();render();
  }catch(e){
    showToast('Save failed: '+e.message,false);
  }
  btn.innerHTML=editId?'Save changes':'Save lead';btn.disabled=false;
}

async function toggleDone(id){
  const l=leads.find(x=>x.id===id);
  const done=!l.done;
  try{
    await updateLead(id,{done});
    l.done=done;render();
    showToast(done?'Lead closed':'Lead reopened');
  }catch(e){showToast('Update failed',false);}
}

async function snooze(id){
  const l=leads.find(x=>x.id===id);
  const base=l.next_date<today()?today():l.next_date;
  const d=new Date(base);d.setDate(d.getDate()+l.interval);
  const next_date=d.toISOString().split('T')[0];
  try{
    await updateLead(id,{next_date,cal_synced:false});
    l.next_date=next_date;l.cal_synced=false;
    render();showToast('Snoozed — next: '+next_date);
  }catch(e){showToast('Snooze failed',false);}
}

function calUrl(lead){
  const d=lead.next_date.replace(/-/g,'');
  const t=(lead.time||'09:00').replace(':','');
  const endH=String(parseInt(t.slice(0,2))+1).padStart(2,'0');
  return'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent('Follow up: '+lead.name)+'&dates='+d+'T'+t+'00/'+d+'T'+endH+t.slice(2)+'00&details='+encodeURIComponent('Contact: '+(lead.contact||'-')+'\n'+(lead.notes||''))+'&recur=RRULE:FREQ%3DDAILY;INTERVAL%3D'+lead.interval;
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  let list=leads.filter(l=>{
    if(q&&!l.name.toLowerCase().includes(q)&&!(l.contact||'').toLowerCase().includes(q))return false;
    const s=getStatus(l);
    if(filter==='active')return!l.done;
    if(filter==='done')return l.done;
    if(filter==='overdue')return s==='overdue';
    return true;
  });
  list.sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;return new Date(a.next_date)-new Date(b.next_date);});
  const active=leads.filter(l=>!l.done);
  document.getElementById('s-active').textContent=active.length;
  document.getElementById('s-today').textContent=active.filter(l=>getStatus(l)==='today').length;
  document.getElementById('s-overdue').textContent=active.filter(l=>getStatus(l)==='overdue').length;
  const el=document.getElementById('leads');
  if(!list.length){
    const msgs={active:'No active leads yet. Add your first one.',done:'No closed leads.',overdue:'No overdue leads — great work.',all:'No leads yet.'};
    el.innerHTML='<div class="empty"><div class="empty-icon">◎</div><div class="empty-text">'+(msgs[filter]||msgs.all)+'</div></div>';
    return;
  }
  el.innerHTML=list.map(l=>{
    const s=getStatus(l);const du=daysUntil(l.next_date);
    let stag='';
    if(!l.done){
      if(s==='overdue')stag='<span class="tag tag-overdue">'+Math.abs(du)+'d overdue</span>';
      else if(s==='today')stag='<span class="tag tag-today">Due today</span>';
      else stag='<span class="tag tag-upcoming">In '+du+'d &middot; '+l.next_date+'</span>';
    }
    const itag='<span class="tag tag-interval">Every '+l.interval+'d &middot; '+(l.time||'09:00')+'</span>';
    const calBtn='<a href="'+calUrl(l)+'" target="_blank"><button class="act-btn">Add to calendar</button></a>';
    return'<div class="card'+(l.done?' done':'')+(s==='overdue'&&!l.done?' overdue':'')+(s==='today'&&!l.done?' today-due':'')+'"><div class="card-top"><div class="check-wrap"><input type="checkbox" class="check"'+(l.done?' checked':'')+' onchange="toggleDone(\''+l.id+'\')"></div><div class="card-body"><div class="card-name">'+l.name+'</div>'+(l.contact?'<div class="card-contact">'+l.contact+'</div>':'')+'<div class="tags">'+stag+itag+'</div><div class="actions">'+(!l.done?calBtn:'')+((!l.done)?'<button class="act-btn snooze" onclick="snooze(\''+l.id+'\')">Snooze +'+l.interval+'d</button>':'')+'<button class="act-btn" onclick="openModal(\''+l.id+'\')">Edit</button><button class="act-btn danger" onclick="deleteLead(\''+l.id+'\')">Delete</button></div>'+(l.notes?'<div class="card-notes">'+l.notes+'</div>':'')+'</div></div></div>';
  }).join('');
}

document.getElementById('f-date').value=today();
loadLeads();
</script>
</body>
</html>
